name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Doctor
        run: python -m eddy_v2.cli doctor

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/eddy_v2

      - name: Test
        run: pytest -q --cov=eddy_v2 --cov-report=term-missing

      - name: Public scrub
        run: python scripts/public_scrub_check.py

      - name: Whitespace and conflict markers
        run: git diff --check
